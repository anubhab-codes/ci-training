name: CI Training Pipeline

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Greeting
        run: echo "Hello, World! Now I am going to run the tests."

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: pytest